version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: gridrunner_postgres
    environment:
      POSTGRES_USER: gridrunner
      POSTGRES_PASSWORD: gridrunner_password
      POSTGRES_DB: gridrunner_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridrunner -d gridrunner_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: gridrunner_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: